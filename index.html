<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#4A90D9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>家庭物品管理</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css?v=5">
</head>
<body>
  <div id="app">
    <!-- ========== 首页 ========== -->
    <div id="page-index" class="page active">
      <div class="page-header">
        <div class="header-title">家庭物品管理</div>
        <button class="header-btn header-btn-add" onclick="Router.navigate('product-add')" title="添加物品">＋</button>
      </div>
      <div class="page-content">
        <!-- 搜索框 -->
        <div class="home-search-bar">
          <span class="home-search-icon">🔍</span>
          <input type="text" class="home-search-input" id="homeSearchInput" placeholder="搜索物品名称、位置..." oninput="doHomeSearch()" />
          <button class="home-search-clear" id="homeSearchClear" onclick="clearHomeSearch()">×</button>
        </div>
        <!-- 搜索历史 -->
        <div id="homeSearchHistory" style="display:none">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <span style="font-size:13px;color:var(--text-light)">搜索历史</span>
            <span style="font-size:12px;color:var(--primary);cursor:pointer" onclick="clearSearchHistory()">清除</span>
          </div>
          <div id="homeSearchHistoryTags"></div>
        </div>
        <!-- 搜索结果 -->
        <div id="homeSearchResults"></div>
        <!-- 统计卡片 -->
        <div class="stats-grid" id="homeStats">
          <div class="stat-item stat-total">
            <div class="stat-number" id="statTotal">0</div>
            <div class="stat-label">全部物品</div>
          </div>
          <div class="stat-item stat-normal">
            <div class="stat-number" id="statNormal">0</div>
            <div class="stat-label">正常</div>
          </div>
          <div class="stat-item stat-expiring">
            <div class="stat-number" id="statExpiring">0</div>
            <div class="stat-label">即将过期</div>
          </div>
          <div class="stat-item stat-expired">
            <div class="stat-number" id="statExpired">0</div>
            <div class="stat-label">已过期</div>
          </div>
        </div>
        <!-- 即将过期列表 -->
        <div class="card" id="expiringList">
          <div class="card-title">⏰ 即将过期 / 已过期</div>
          <div id="expiringItems"></div>
        </div>
      </div>
    </div>

    <!-- ========== 物品列表 ========== -->
    <div id="page-products" class="page">
      <div class="page-header">
        <div class="header-title">物品列表</div>
        <button class="header-btn" id="batchManageBtn" onclick="toggleBatchMode()" title="批量管理">📋</button>
      </div>
      <div class="page-content">
        <!-- 批量操作栏 -->
        <div id="batchActionBar" class="batch-action-bar" style="display:none">
          <label class="batch-select-all" onclick="toggleSelectAll()">
            <input type="checkbox" id="selectAllCheckbox" />
            <span>全选</span>
          </label>
          <span id="batchCount" class="batch-count">已选 0 项</span>
          <button class="batch-delete-btn" id="batchDeleteBtn" onclick="batchDelete()" disabled>🗑️ 删除选中</button>
          <button class="batch-cancel-btn" onclick="toggleBatchMode()">取消</button>
        </div>
        <div class="card" id="productList">
          <div id="productItems"></div>
        </div>
      </div>
    </div>

    <!-- ========== 添加物品 ========== -->
    <div id="page-product-add" class="page">
      <div class="page-header">
        <button class="btn-back" onclick="Router.back()">← 返回</button>
        <div class="header-title">添加物品</div>
      </div>
      <div class="page-content">
        <form id="addForm" onsubmit="return false">
          <div id="addImagePreview" class="image-preview" style="display:none">
            <img id="addImagePreviewImg" src="" alt="预览" />
            <button type="button" class="image-preview-remove" onclick="removeAddImage()">×</button>
          </div>
          <div class="camera-btn" onclick="takePhoto()">
            📷 拍照识别（AI）
          </div>
          <input type="hidden" id="addImageData">
          <div class="form-group">
            <label class="form-label">名称 *</label>
            <input type="text" class="form-input" id="addName" placeholder="请输入物品名称" required />
          </div>
          <div class="form-group">
            <label class="form-label">分类</label>
            <div class="category-grid" id="addCategoryGrid"></div>
          </div>
          <div class="form-group">
            <label class="form-label">位置</label>
            <select class="form-select" id="addLocation"></select>
          </div>
          <div class="form-group">
            <label class="form-label">数量</label>
            <input type="number" class="form-input" id="addQuantity" value="1" min="1" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">生产日期</label>
              <input type="date" class="form-input" id="addProductionDate" />
            </div>
            <div class="form-group">
              <label class="form-label">保质期</label>
              <div class="form-row">
                <input type="number" class="form-input" id="addShelfLife" placeholder="数值" style="flex:1" />
                <select class="form-select" id="addShelfLifeUnit" style="flex:1">
                  <option value="days">天</option>
                  <option value="months">月</option>
                  <option value="years">年</option>
                </select>
              </div>
              <label class="form-checkbox" style="margin-top:6px">
                <input type="checkbox" id="addNoExpiry" onchange="toggleNoExpiry('add')" />
                <span>无保质期（如衣物、工具等）</span>
              </label>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">备注</label>
            <textarea class="form-input" id="addNotes" rows="2" placeholder="可选备注信息"></textarea>
          </div>
          <button type="button" class="btn btn-primary" onclick="submitProduct()" style="width:100%">保存</button>
        </form>
      </div>
    </div>

    <!-- ========== 物品详情 ========== -->
    <div id="page-product-detail" class="page">
      <div class="page-header">
        <button class="btn-back" onclick="Router.back()">← 返回</button>
        <div class="header-title" id="detailHeader">物品详情</div>
      </div>
      <div class="page-content">
        <div id="detailContent"></div>
        <div class="action-bar" id="detailActions"></div>
      </div>
    </div>

    <!-- ========== 编辑物品 ========== -->
    <div id="page-product-edit" class="page">
      <div class="page-header">
        <button class="btn-back" onclick="Router.back()">← 返回</button>
        <div class="header-title">编辑物品</div>
      </div>
      <div class="page-content">
        <form id="editForm" onsubmit="return false">
          <div class="form-group">
            <label class="form-label">名称</label>
            <input type="text" class="form-input" id="editName" />
          </div>
          <div class="form-group">
            <label class="form-label">分类</label>
            <div class="category-grid" id="editCategoryGrid"></div>
          </div>
          <div class="form-group">
            <label class="form-label">位置</label>
            <select class="form-select" id="editLocation"></select>
          </div>
          <div class="form-group">
            <label class="form-label">数量</label>
            <input type="number" class="form-input" id="editQuantity" min="1" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">生产日期</label>
              <input type="date" class="form-input" id="editProductionDate" />
            </div>
            <div class="form-group">
              <label class="form-label">保质期</label>
              <div class="form-row">
                <input type="number" class="form-input" id="editShelfLife" placeholder="数值" style="flex:1" />
                <select class="form-select" id="editShelfLifeUnit" style="flex:1">
                  <option value="days">天</option>
                  <option value="months">月</option>
                  <option value="years">年</option>
                </select>
              </div>
              <label class="form-checkbox" style="margin-top:6px">
                <input type="checkbox" id="editNoExpiry" onchange="toggleNoExpiry('edit')" />
                <span>无保质期（如衣物、工具等）</span>
              </label>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">备注</label>
            <textarea class="form-input" id="editNotes" rows="2"></textarea>
          </div>
          <button type="button" class="btn btn-primary" onclick="submitEdit()" style="width:100%">保存修改</button>
        </form>
      </div>
    </div>

    <!-- ========== 位置列表 ========== -->
    <div id="page-locations" class="page">
      <div class="page-header">
        <div class="header-title">位置管理</div>
        <button class="header-btn" onclick="showAddLocation('')" title="添加位置">＋</button>
      </div>
      <div class="page-content">
        <div class="card">
          <ul class="tree-list" id="locationTree"></ul>
        </div>
      </div>
    </div>

    <!-- ========== 我的 ========== -->
    <div id="page-mine" class="page">
      <div class="page-header">
        <div class="header-title">我的</div>
      </div>
      <div class="page-content">
        <!-- 用户信息 -->
        <div class="mine-user-card" id="mineUserInfo">
          <div class="mine-avatar">👤</div>
          <div class="mine-user-detail">
            <div class="mine-nickname" id="mineNickname">未登录</div>
            <div class="mine-family-name" id="mineFamilyName">未加入家庭</div>
          </div>
        </div>

        <!-- 家庭管理 -->
        <div class="mine-section">
          <div class="mine-section-title">👨‍👩‍👧‍👦 家庭管理</div>
          <div id="mineFamilySection">
            <!-- 由 JS 动态渲染 -->
          </div>
        </div>

        <!-- AI 识别配置 -->
        <div class="mine-section">
          <div class="mine-section-title">🤖 AI 识别配置</div>
          <div id="mineAISection">
            <!-- 由 JS 动态渲染 -->
          </div>
        </div>

        <!-- 位置管理 -->
        <div class="mine-section">
          <div class="mine-section-title">📍 位置管理</div>
          <div class="mine-menu-item" onclick="showAddLocation('')">
            <span class="menu-item-icon">➕</span>
            <span class="menu-item-text">添加位置</span>
            <span class="menu-item-arrow">›</span>
          </div>
        </div>

        <!-- 云端同步 -->
        <div class="mine-section">
          <div class="mine-section-title">☁️ 云端同步</div>
          <div id="mineSyncSection">
            <!-- 由 JS 动态渲染 -->
          </div>
        </div>

        <!-- 数据管理 -->
        <div class="mine-section">
          <div class="mine-section-title">📁 数据管理</div>
          <div class="mine-menu-item" onclick="exportData()">
            <span class="menu-item-icon">📤</span>
            <span class="menu-item-text">导出数据</span>
            <span class="menu-item-arrow">›</span>
          </div>
          <div class="mine-menu-item" onclick="importData()">
            <span class="menu-item-icon">📥</span>
            <span class="menu-item-text">导入数据</span>
            <span class="menu-item-arrow">›</span>
          </div>
          <div class="mine-menu-item" onclick="clearAllData()" style="color:var(--danger)">
            <span class="menu-item-icon">🗑️</span>
            <span class="menu-item-text">清除所有数据</span>
            <span class="menu-item-arrow">›</span>
          </div>
        </div>

        <!-- 版本信息 -->
        <div class="mine-version">家庭物品管理 v5.0 · 数据存储在本地</div>
      </div>
    </div>

    <!-- ========== 位置详情 ========== -->
    <div id="page-location-detail" class="page">
      <div class="page-header">
        <button class="btn-back" onclick="Router.back()">← 返回</button>
        <div class="header-title" id="locDetailTitle">位置详情</div>
      </div>
      <div class="page-content">
        <div id="locProducts"></div>
        <div class="action-bar" id="locActions"></div>
      </div>
    </div>

    <!-- ========== 位置表单弹窗 ========== -->
    <div id="locationForm" style="display:none;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-radius:16px 16px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,0.15);z-index:200;padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom))">
      <div style="font-size:18px;font-weight:600;margin-bottom:16px" id="locationFormTitle">添加位置</div>
      <input type="hidden" id="addLocationParentId" />
      <div class="form-group">
        <input type="text" class="form-input" id="addLocationName" placeholder="请输入位置名称" />
      </div>
      <div class="action-bar">
        <button class="btn btn-secondary" onclick="document.getElementById('locationForm').style.display='none'" style="flex:1">取消</button>
        <button class="btn btn-primary" onclick="submitLocation()" style="flex:1">确定</button>
      </div>
    </div>

    <!-- ========== 底部标签栏 ========== -->
    <div class="tab-bar">
      <button class="tab-item active" data-page="index" onclick="Router.navigate('index')">
        <span class="tab-icon">🏠</span>
        <span class="tab-label">首页</span>
      </button>
      <button class="tab-item" data-page="products" onclick="Router.navigate('products')">
        <span class="tab-icon">📦</span>
        <span class="tab-label">物品</span>
      </button>
      <button class="tab-item" data-page="locations" onclick="Router.navigate('locations')">
        <span class="tab-icon">📍</span>
        <span class="tab-label">位置</span>
      </button>
      <button class="tab-item" data-page="mine" onclick="Router.navigate('mine')">
        <span class="tab-icon">👤</span>
        <span class="tab-label">我的</span>
      </button>
    </div>
  </div>

  <script src="js/constants.js?v=5"></script>
  <script src="js/db.js?v=5"></script>
  <script src="js/util.js?v=5"></script>
  <script src="js/family.js?v=5"></script>
  <script src="js/sync.js?v=5"></script>
  <script src="js/ai.js?v=5"></script>
  <script src="js/app.js?v=5"></script>
</body>
</html>
